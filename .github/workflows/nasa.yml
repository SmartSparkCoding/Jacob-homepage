name: Update NASA APOD

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nasa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch NASA APOD
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: |
          curl "https://api.nasa.gov/planetary/apod?api_key=$NASA_API_KEY" > apod.json

      - name: Commit APOD data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apod.json
          git commit -m "Update NASA APOD" || exit 0
          git push
